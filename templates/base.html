<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GDC Vault 브라우저{% endblock %}</title>
  <!-- Pico CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/style.css?v={{ asset_version }}">
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/browse">GDC Vault 브라우저</a></strong></li>
      </ul>
      <ul>
        {% if logged_in %}
        <li><a href="/logout" role="button" class="outline secondary">로그아웃</a></li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <article class="flash">{{ msg }}</article>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer class="container">
    <small>GDC Vault 트랜스크립트 브라우저 — 개인 학습용</small>
  </footer>

  <script src="/static/app.js?v={{ asset_version }}"></script>
</body>
</html>
